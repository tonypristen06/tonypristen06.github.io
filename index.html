<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Của Tôi</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Hình nền */
            background-image: url('https://phunugioi.com/wp-content/uploads/2020/02/mau-background-dep.jpg');
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
        }

        /* Khung nội dung chính */
        .container {
            background-color: rgba(255, 255, 255, 0.9); /* Trắng mờ để nổi bật trên nền */
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(5px); /* Làm mờ nhẹ nền phía sau khung */
        }

        h1 { 
            color: #d32f2f; 
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p { 
            color: #444;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* Nút liên hệ */
        .btn-facebook {
            display: inline-block;
            padding: 12px 25px;
            background-color: #1877f2;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        .btn-facebook:hover {
            background-color: #145dbf;
            transform: translateY(-3px); /* Nhảy nhẹ lên trên */
            box-shadow: 0 6px 15px rgba(24, 119, 242, 0.4);
        }

        .btn-facebook:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chào mừng bạn!</h1>
        <p>Đây là trang web đầu tiên mình tự tay xây dựng và deploy. Rất vui được làm quen với mọi người!</p>
        
        <img src="https://via.placeholder.com/150" alt="Ảnh đại diện" class="profile-img">
        
        <br>
        
        <a href="https://facebook.com" target="_blank" class="btn-facebook">
            Kết nối qua Facebook
        </a>
    </div>

</body>
</html>
