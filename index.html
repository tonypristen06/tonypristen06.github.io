<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Website Của Tôi</title>
    <style>
        body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    /* Chèn hình nền từ link của bạn */
    background-image: url('https://phunugioi.com/wp-content/uploads/2020/02/mau-background-dep.jpg');
    /* Giúp hình nền phủ kín toàn bộ màn hình */
    background-size: cover; 
    /* Giữ hình nền cố định khi cuộn trang */
    background-attachment: fixed;
    /* Căn giữa hình nền */
    background-position: center;
    margin: 0;
    padding: 0;
}
        h1 { color: #333; }
    </style>
</head>
<body>

</body>
</html>
