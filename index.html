<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Bio Giống Mẫu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3e8ff; /* Màu nền tím nhạt */
        }

        .bio-container {
            width: 90%;
            max-width: 480px; /* Độ rộng tối đa để trông giống điện thoại */
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* Phần ảnh đại diện */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #eee;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 5px;
            font-weight: 600;
        }

        .tagline {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
        }

        /* Group các nút */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Khoảng cách giữa các nút */
        }

        /* Style cho mỗi nút liên kết */
        .bio-link {
            display: block;
            padding: 18px;
            background-color: #f0fdf4; /* Màu nền xanh lá siêu nhạt */
            color: #1d1d1f;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: transform 0.2s ease, background-color 0.2s ease;
            position: relative;
        }

        /* Hiệu ứng khi di chuột vào nút */
        .bio-link:hover {
            background-color: #dcfce7; /* Xanh lá đậm hơn một chút */
            transform: scale(1.02);
        }

        /* Thêm dấu 3 chấm nhỏ ở góc phải (cho giống mẫu) */
        .bio-link::after {
            content: "⋮";
            position: absolute;
            right: 20px;
            color: #ccc;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="bio-container">
        <img src="https://via.placeholder.com/100" alt="Avatar" class="profile-img">
        <h1>Xuân Huy</h1>
        <p class="tagline">social media links</p>

        <div class="links-group">
            <a href="#" target="_blank" class="bio-link">Valorant Tracker</a>
            <a href="#" target="_blank" class="bio-link">Twitter</a>
            <a href="#" target="_blank" class="bio-link">Instagram</a>
            <a href="#" target="_blank" class="bio-link">Youtube</a>
        </div>
    </div>

</body>
</html>
