<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Website Của Tôi</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            /* Chèn hình nền */
            background-image: url('https://phunugioi.com/wp-content/uploads/2020/02/mau-background-dep.jpg');
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 0;
            padding-top: 80px; /* Đẩy nội dung xuống cho thoáng */
        }

        h1 { 
            color: #d32f2f; /* Màu đỏ đô */
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8); /* Thêm bóng trắng cho chữ nổi bật */
        }

        p { 
            color: #1976d2; /* Màu xanh dương */
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* Trang trí cho cái link Facebook */
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #1877f2; /* Màu xanh Facebook */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            background-color: #145dbf;
            transform: scale(1.1); /* Phóng to nhẹ khi di chuột vào */
        }
    </style>
</head>
<body>
    <h1>Chào mừng đến với website cá nhân của mình!</h1>
    <p>Đây là trang web đầu tiên mình tự tay xây dựng và deploy.</p>
    <img src="https://via.placeholder.com/150" alt="Ảnh minh họa" style="border-radius: 50%; border: 5px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
    <br>
    <a href="https://facebook.com" target="_blank">Liên hệ với mình qua Facebook</a>
</body>
</html>
